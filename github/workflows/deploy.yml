name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Build Spring Boot app
      - name: Build with Gradle
        run: ./gradlew build

      # Login to Azure Container Registry
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: shipmentacr12345.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -t shipmentacr12345.azurecr.io/shipment-tracker:latest .

      # Push image to ACR
      - name: Push Docker image
        run: |
          docker push shipmentacr12345.azurecr.io/shipment-tracker:latest

      # Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy to Azure Web App
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: shipment-api-app
          images: shipmentacr12345.azurecr.io/shipment-tracker:latest